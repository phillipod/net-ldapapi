# Minimum standard schema set used by the Cucumber suite.  Debian and Ubuntu
# install these files below /etc/ldap; adjust the paths for other layouts.
include         /etc/ldap/schema/core.schema
include         /etc/ldap/schema/cosine.schema
include         /etc/ldap/schema/inetorgperson.schema

pidfile         /tmp/net-ldapapi-slapd.pid
argsfile        /tmp/net-ldapapi-slapd.args

# The complete suite also exercises RFC 4533 Sync, Server Side Sort, and VLV.
# Debian and Ubuntu install the corresponding modules below /usr/lib/ldap.
modulepath      /usr/lib/ldap
moduleload      back_mdb
moduleload      syncprov
moduleload      sssvlv

database        mdb
maxsize         10485760
suffix          "dc=example,dc=com"
rootdn          "cn=admin,dc=example,dc=com"
rootpw          password
directory       /tmp/net-ldapapi-slapd-data

index           objectClass eq
index           sn eq

overlay         syncprov
overlay         sssvlv
