name: OpenLDAP historical source compatibility

on:
  workflow_dispatch:
    inputs:
      ldapapi_ci_debug:
        description: Capture verbose slapd and system diagnostics
        required: false
        type: boolean
        default: true

permissions:
  actions: read
  contents: read

env:
  LDAPAPI_CI_DEBUG: ${{ inputs.ldapapi_ci_debug }}

jobs:
  cucumber:
    name: OpenLDAP ${{ matrix.openldap.version }} (source on Debian ${{ matrix.debian.name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DEBIAN_TEST_CONTAINER: net-ldapapi-source
    strategy:
      fail-fast: false
      matrix:
        debian:
          - suite: wheezy
            name: Wheezy
          - suite: jessie
            name: Jessie
        openldap: &openldap_versions
          - version: 2.3.43
            sha256: d7d2dea05362c8ac7e11bb7bf1da4cdeb07225ba8dc16974bff9f51a9f3d37e1
            backend: bdb
            berkeley_db: 4.5.20.NC
            berkeley_db_sha256: 81a0ccdcce1e4a8138656190b3dd9ee76b9f922c15500c271283055838dbd497
            syncprov: true
            sssvlv: false
          - version: 2.4.6
            sha256: e3af73a91c9cf7a78d700c348a55792d65fc945218fe7f3abf9a97acd00ac579
            backend: bdb
            berkeley_db: 4.6.21.NC
            berkeley_db_sha256: 22726bcf2ee193a1687ef8a93f8da307d893bb90de0a9def63589d2b35288986
            syncprov: true
            sssvlv: false
          - version: 2.4.8
            sha256: 23d9a45241dcf81ab4094c892eafe7111306b31c34387d5c21c9c918d68e5b80
            backend: bdb
            berkeley_db: 4.6.21.NC
            berkeley_db_sha256: 22726bcf2ee193a1687ef8a93f8da307d893bb90de0a9def63589d2b35288986
            syncprov: true
            sssvlv: false
          - version: 2.4.15
            sha256: ff1211c492b0666e99c617bd9937eceb664c01c3099b2a0b1184b57d2c284aee
            backend: bdb
            berkeley_db: 4.6.21.NC
            berkeley_db_sha256: 22726bcf2ee193a1687ef8a93f8da307d893bb90de0a9def63589d2b35288986
            syncprov: true
            sssvlv: false
          - version: 2.4.22
            sha256: c29b34031305616cf2c847d30706e2d2cdfc2cf91431e0bddab5d483395a40c1
            backend: bdb
            berkeley_db: 4.6.21.NC
            berkeley_db_sha256: 22726bcf2ee193a1687ef8a93f8da307d893bb90de0a9def63589d2b35288986
            syncprov: true
            # Its sssvlv overlay encodes virtualListViewResult as INTEGER,
            # rather than ENUMERATED (ITS#6685, fixed in 2.4.24).
            sssvlv: true
            server_controls_skip_reason: >-
              OpenLDAP 2.4.22 encodes the VLV result as INTEGER rather than
              ENUMERATED (ITS#6685; fixed in 2.4.24)
          - version: 2.4.29
            sha256: 44e95acab6c94b53723a451bd272c10f4f596f42bf26593ab84bb399d053c1e1
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.31
            sha256: bde845840df4794b869a6efd6a6b1086f80989038e4844b2e4d7d6b57b39c5b6
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.32
            sha256: 9ee413c6a816cb41f71826759b78001d04e747ede9dde302d6ba94ab16f0b82e
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.33
            sha256: 81e9eca20f17a69a5d15ebc4c66a323106da4f4f80a32105bc7cdea333aca14c
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.34
            sha256: eaab4c4a6b09cc9e60f97e6ef9974f8327d977d1d7af7bc00c2bc5f90dfe0606
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.35
            sha256: 16100374c147df0d82a5c52ca60da5eca1a5ea8b5a187467d40a78e3691e9eeb
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.36
            sha256: 05b013faa789f38012aa92e2dc42ac02ea77502302ae7dac5ab225cbe73ce67a
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.37
            sha256: 3808f4e0800345bedf394882acc169d5d0d41cd204d742ffa217cf391fab5723
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.38
            sha256: 88209a3599ec5d9354fc09bbe29b99db1ffa1b612127c06bad0c5265d0b31fd1
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.39
            sha256: 8267c87347103fef56b783b24877c0feda1063d3cb85d070e503d076584bf8a7
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.40
            sha256: d12611a5c25b6499293c2bb7b435dc2b174db73e83f5a8cb7e34f2ce5fa6dadb
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.41
            sha256: 27856bb4a8b44feca2b326c309000e16a9dadd52362c8ab6eec6c67a43737f6e
            backend: mdb
            syncprov: true
            sssvlv: true
          - version: 2.4.42
            sha256: eeb7b0e2c5852bfd2650e83909bb6152835c0b862fab10b63954dc1bcbba8e63
            backend: mdb
            syncprov: true
            sssvlv: true

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Restore OpenLDAP source build
        id: restore-openldap
        uses: actions/cache/restore@v4
        with:
          path: .cache/openldap/${{ matrix.debian.suite }}/${{ matrix.openldap.version }}
          key: openldap-source-${{ runner.os }}-${{ runner.arch }}-${{ matrix.debian.suite }}-${{ matrix.openldap.version }}-${{ matrix.openldap.sha256 }}-${{ matrix.openldap.backend }}-${{ matrix.openldap.berkeley_db || 'none' }}-v3

      - name: Build OpenLDAP
        if: steps.restore-openldap.outputs.cache-hit != 'true'
        env:
          IMAGE: debian:${{ matrix.debian.suite }}
          DEBIAN_SUITE: ${{ matrix.debian.suite }}
          OPENLDAP_VERSION: ${{ matrix.openldap.version }}
          OPENLDAP_SHA256: ${{ matrix.openldap.sha256 }}
          OPENLDAP_BACKEND: ${{ matrix.openldap.backend }}
          OPENLDAP_SYNCPROV: ${{ matrix.openldap.syncprov }}
          OPENLDAP_SSSVLV: ${{ matrix.openldap.sssvlv }}
          BERKELEY_DB_VERSION: ${{ matrix.openldap.berkeley_db }}
          BERKELEY_DB_SHA256: ${{ matrix.openldap.berkeley_db_sha256 }}
          OPENLDAP_CACHE_DIR: .cache/openldap/${{ matrix.debian.suite }}/${{ matrix.openldap.version }}
        run: |
          mkdir -p "$OPENLDAP_CACHE_DIR"
          openldap_archive="$RUNNER_TEMP/openldap-$OPENLDAP_VERSION.tgz"
          berkeley_db_archive="$RUNNER_TEMP/db-$BERKELEY_DB_VERSION.tar.gz"
          curl --fail --location --silent --show-error \
            "https://www.openldap.org/software/download/OpenLDAP/openldap-release/openldap-$OPENLDAP_VERSION.tgz" \
            --output "$openldap_archive"
          printf '%s  %s\n' "$OPENLDAP_SHA256" "$openldap_archive" \
            | sha256sum --check
          if [ "$OPENLDAP_BACKEND" = bdb ]; then
            curl --fail --location --silent --show-error \
              "https://download.oracle.com/berkeley-db/db-$BERKELEY_DB_VERSION.tar.gz" \
              --output "$berkeley_db_archive"
            printf '%s  %s\n' "$BERKELEY_DB_SHA256" "$berkeley_db_archive" \
              | sha256sum --check
          else
            : > "$berkeley_db_archive"
          fi
          docker run --rm --interactive \
            --volume "$PWD/$OPENLDAP_CACHE_DIR:/opt/openldap" \
            --volume "$openldap_archive:/tmp/openldap.tgz:ro" \
            --volume "$berkeley_db_archive:/tmp/berkeley-db.tgz:ro" \
            --env DEBIAN_SUITE="$DEBIAN_SUITE" \
            --env OPENLDAP_VERSION="$OPENLDAP_VERSION" \
            --env OPENLDAP_BACKEND="$OPENLDAP_BACKEND" \
            --env OPENLDAP_SYNCPROV="$OPENLDAP_SYNCPROV" \
            --env OPENLDAP_SSSVLV="$OPENLDAP_SSSVLV" \
            "$IMAGE" \
            bash -s <<'EOF'
          set -euxo pipefail

          export DEBIAN_FRONTEND=noninteractive

          printf '%s\n' \
            "deb http://archive.debian.org/debian $DEBIAN_SUITE main" \
            "deb http://archive.debian.org/debian-security $DEBIAN_SUITE/updates main" \
            > /etc/apt/sources.list
          printf '%s\n' 'Acquire::Check-Valid-Until "false";' \
            > /etc/apt/apt.conf.d/99archive
          apt-get -o Acquire::Check-Valid-Until=false update
          apt-get -o Acquire::Check-Valid-Until=false \
            --allow-unauthenticated \
            install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            file \
            groff-base \
            libltdl-dev \
            libsasl2-dev

          if [ "$OPENLDAP_BACKEND" = bdb ]; then
            install -d /tmp/berkeley-db
            tar --extract --gzip \
              --strip-components=1 \
              --file /tmp/berkeley-db.tgz \
              --directory /tmp/berkeley-db
            cd /tmp/berkeley-db/build_unix
            ../dist/configure \
              --prefix=/opt/openldap \
              --disable-shared \
              --disable-cxx
            make -j2
            make install
          fi

          install -d "/tmp/openldap-$OPENLDAP_VERSION"
          tar --extract --gzip \
            --strip-components=1 \
            --file /tmp/openldap.tgz \
            --directory "/tmp/openldap-$OPENLDAP_VERSION"
          cd "/tmp/openldap-$OPENLDAP_VERSION"
          if grep -q '^#elif LDAP_PVT_THREAD_STACK_SIZE == 0' \
            include/ldap_pvt_thread.h; then
            sed -i \
              's/( 1 \* 1024 \* 1024 \* sizeof(void \*) )/8388608/' \
              include/ldap_pvt_thread.h
          fi
          if grep -q 'struct ucred peercred' libraries/liblutil/getpeereid.c \
            && ! grep -q '_GNU_SOURCE' libraries/liblutil/getpeereid.c; then
            sed -i '1i#define _GNU_SOURCE 1' \
              libraries/liblutil/getpeereid.c
          fi
          sed -i \
            's/size_t peercredlen = sizeof peercred;/socklen_t peercredlen = sizeof peercred;/' \
            libraries/liblutil/getpeereid.c
          sed -i \
            's/^#elif defined( MAXHOSTNAMELEN$/#elif defined( MAXHOSTNAMELEN )/' \
            libraries/libldap/os-ip.c

          configure_args=(
            --prefix=/opt/openldap \
            --with-cyrus-sasl \
            --without-tls \
            --disable-modules
          )
          if [ "$OPENLDAP_BACKEND" = bdb ]; then
            configure_args+=(--enable-bdb=yes --disable-hdb)
          else
            configure_args+=(--enable-mdb=yes --disable-bdb --disable-hdb)
          fi
          if [ "$OPENLDAP_SYNCPROV" = true ]; then
            configure_args+=(--enable-syncprov=yes)
          fi
          if [ "$OPENLDAP_SSSVLV" = true ]; then
            configure_args+=(--enable-sssvlv=yes)
          fi

          CPPFLAGS=-I/opt/openldap/include \
            LDFLAGS=-L/opt/openldap/lib \
            ./configure "${configure_args[@]}"
          make depend
          make -j2
          make install

          test -x /opt/openldap/libexec/slapd
          chmod -R a+rX /opt/openldap
          EOF

      - name: Save OpenLDAP source build
        if: steps.restore-openldap.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/openldap/${{ matrix.debian.suite }}/${{ matrix.openldap.version }}
          key: ${{ steps.restore-openldap.outputs.cache-primary-key }}

      - name: Start Debian LDAP test environment
        env:
          IMAGE: debian:${{ matrix.debian.suite }}
          DEBIAN_SUITE: ${{ matrix.debian.suite }}
          OPENLDAP_VERSION: ${{ matrix.openldap.version }}
          OPENLDAP_BACKEND: ${{ matrix.openldap.backend }}
          OPENLDAP_SYNCPROV: ${{ matrix.openldap.syncprov }}
          OPENLDAP_SSSVLV: ${{ matrix.openldap.sssvlv }}
          OPENLDAP_SERVER_CONTROLS_SKIP_REASON: ${{ matrix.openldap.server_controls_skip_reason }}
          OPENLDAP_CACHE_DIR: .cache/openldap/${{ matrix.debian.suite }}/${{ matrix.openldap.version }}
        run: |
          result_dir="$RUNNER_TEMP/cucumber-results"
          result_file="source-$OPENLDAP_VERSION-$DEBIAN_SUITE.tsv"
          syncrepl_probe_result_file="syncrepl-c-sdk-probe-source-$OPENLDAP_VERSION-$DEBIAN_SUITE.tsv"
          mkdir -p "$result_dir"
          docker rm -f "$DEBIAN_TEST_CONTAINER" >/dev/null 2>&1 || true
          docker run --detach --name "$DEBIAN_TEST_CONTAINER" \
            --volume "$PWD:/src:ro" \
            --volume "$PWD/$OPENLDAP_CACHE_DIR:/opt/openldap:ro" \
            --volume "$result_dir:/results" \
            --workdir /work \
            --env DEBIAN_SUITE="$DEBIAN_SUITE" \
            --env OPENLDAP_VERSION="$OPENLDAP_VERSION" \
            --env OPENLDAP_BACKEND="$OPENLDAP_BACKEND" \
            --env OPENLDAP_SYNCPROV="$OPENLDAP_SYNCPROV" \
            --env OPENLDAP_SSSVLV="$OPENLDAP_SSSVLV" \
            --env OPENLDAP_SERVER_CONTROLS_SKIP_REASON="$OPENLDAP_SERVER_CONTROLS_SKIP_REASON" \
            --env LDAPAPI_CI_DEBUG="$LDAPAPI_CI_DEBUG" \
            --env SYNCPROBE_RESULT_FILE="$syncrepl_probe_result_file" \
            --env CUCUMBER_RESULTS_FILE="/results/$result_file" \
            "$IMAGE" \
            tail -f /dev/null
          docker exec --workdir /work "$DEBIAN_TEST_CONTAINER" bash -s <<'EOF'
          set -euxo pipefail

          export DEBIAN_FRONTEND=noninteractive
          export HOME=/tmp/net-ldapapi-home
          ulimit -c unlimited || true

          diagnostics_dir="/results/diagnostics-source-$OPENLDAP_VERSION-$DEBIAN_SUITE"
          rm -rf "$diagnostics_dir"
          mkdir -p "$diagnostics_dir/features" "$diagnostics_dir/cores"

          cp -a /src/. /work/
          sed -i "s/\$VERSION = '3\.0\.x';/\$VERSION = '3.000999';/" LDAPapi.pm
          grep -F "\$VERSION = '3.000999';" LDAPapi.pm

          printf '%s\n' \
            "deb http://archive.debian.org/debian $DEBIAN_SUITE main" \
            "deb http://archive.debian.org/debian-security $DEBIAN_SUITE/updates main" \
            > /etc/apt/sources.list
          printf '%s\n' 'Acquire::Check-Valid-Until "false";' \
            > /etc/apt/apt.conf.d/99archive
          apt-get -o Acquire::Check-Valid-Until=false update
          apt-get -o Acquire::Check-Valid-Until=false \
            --allow-unauthenticated \
            install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            libclone-perl \
            libconvert-asn1-perl \
            libdevel-cover-perl \
            libfile-find-rule-perl \
            libfile-slurp-perl \
            libio-stringy-perl \
            libjson-pp-perl \
            libjson-xs-perl \
            liblist-moreutils-perl \
            libmoose-perl \
            libnumber-range-perl \
            libpath-class-perl \
            libsasl2-dev \
            libtest-differences-perl \
            libyaml-syck-perl \
            slapd

          if [ "$DEBIAN_SUITE" = "wheezy" ]; then
            printf '%s\n' \
              'deb http://archive.debian.org/debian jessie main' \
              > /etc/apt/sources.list.d/jessie.list
            apt-get -o Acquire::Check-Valid-Until=false update
          fi
          if [ "$DEBIAN_SUITE" = "wheezy" ] || [ "$DEBIAN_SUITE" = "jessie" ]; then
            apt-get -o Acquire::Check-Valid-Until=false \
              --allow-unauthenticated \
              install -y --no-install-recommends \
              libjson-maybexs-perl=1.002006-1 \
              libjson-pp-perl=2.27300-2
          fi

          curl --fail --location --silent --show-error \
            http://cpan.metacpan.org/authors/id/S/SA/SARGIE/Test-BDD-Cucumber-0.34.tar.gz \
            --output /tmp/Test-BDD-Cucumber-0.34.tar.gz
          printf '%s  %s\n' \
            be3184806292a9bf2d24c284ad76180b372221d0de0969decdb797236a3250b7 \
            /tmp/Test-BDD-Cucumber-0.34.tar.gz \
            | sha256sum --check
          tar --extract --gzip \
            --file /tmp/Test-BDD-Cucumber-0.34.tar.gz \
            --directory /tmp
          cd /tmp/Test-BDD-Cucumber-0.34
          perl Makefile.PL
          make install
          perl -MTest::BDD::Cucumber -e \
            'die "Expected Test::BDD::Cucumber 0.34, found $Test::BDD::Cucumber::VERSION\n" if $Test::BDD::Cucumber::VERSION ne "0.34"'

          perl -MTest::BDD::Cucumber -e 'print "$Test::BDD::Cucumber::VERSION\n"'

          export PATH="/opt/openldap/bin:/opt/openldap/sbin:$PATH"
          export LD_LIBRARY_PATH=/opt/openldap/lib
          slapd_command=/opt/openldap/libexec/slapd

          "$slapd_command" -VV > /tmp/slapd-version.txt 2>&1 || true
          cat /tmp/slapd-version.txt
          grep -F "$OPENLDAP_VERSION" /tmp/slapd-version.txt

          cd /work
          perl Makefile.PL \
            -sdk openldap \
            -include_path /opt/openldap/include \
            -lib_path /opt/openldap/lib \
            -sasl_include_path /usr/include/sasl
          make

          mkdir -p "$HOME"
          cat > "$HOME/.net-ldapapi-test-config.conf" <<'PERL'
          $RunDeveloperTests = 1;
          $TestConfig{'ldap'}{'server'}{'tcp'}{'-host'} = '127.0.0.1';
          $TestConfig{'ldap'}{'server'}{'tcp'}{'-port'} = 39010;
          $TestConfig{'ldap'}{'server'}{'ldapi'}{'-url'} = 'ldapi://%2Ftmp%2Fnet-ldapapi-ldapi/';
          1;
          PERL

          skip_legacy_sasl=false
          case "$OPENLDAP_VERSION" in
            2.3.43|2.4.6|2.4.7|2.4.8|2.4.9|2.4.10|2.4.11|2.4.12|2.4.13|2.4.14|2.4.15)
              skip_legacy_sasl=true
              ;;
          esac
          if [ "$skip_legacy_sasl" = true ]; then
            printf '%s\n' \
              "\$TestConfig{'ldap'}{'bind_types'}{'sasl'}{'enabled'} = 0;" \
              '1;' \
              >> "$HOME/.net-ldapapi-test-config.conf"
          fi

          cp t/ldap/slapd.conf /tmp/net-ldapapi-slapd.conf
          schema_dir=/opt/openldap/etc/openldap/schema
          test -r "$schema_dir/core.schema"
          test -r "$schema_dir/cosine.schema"
          test -r "$schema_dir/inetorgperson.schema"
          sed -i \
            -e "s#/etc/ldap/schema/#$schema_dir/#g" \
            -e '/^modulepath[[:space:]]/d' \
            -e '/^moduleload[[:space:]]/d' \
            /tmp/net-ldapapi-slapd.conf
          if [ "$OPENLDAP_BACKEND" = bdb ]; then
            sed -i \
              -e 's/^database[[:space:]]\+mdb$/database        bdb/' \
              -e '/^maxsize[[:space:]]/d' \
              /tmp/net-ldapapi-slapd.conf
          fi
          if [ "$OPENLDAP_SYNCPROV" != true ]; then
            sed -i '/^overlay[[:space:]]\+syncprov$/d' \
              /tmp/net-ldapapi-slapd.conf
          fi
          if [ "$OPENLDAP_SSSVLV" != true ]; then
            sed -i '/^overlay[[:space:]]\+sssvlv$/d' \
              /tmp/net-ldapapi-slapd.conf
          fi

          rm -rf /tmp/net-ldapapi-slapd-data /tmp/net-ldapapi-ldapi
          install -d /tmp/net-ldapapi-slapd-data /run/slapd /var/run/slapd
          if ! slaptest -f /tmp/net-ldapapi-slapd.conf -u \
            >/tmp/net-ldapapi-slaptest.log 2>&1; then
            cat /tmp/net-ldapapi-slaptest.log
            exit 1
          fi
          cat /tmp/net-ldapapi-slaptest.log
          if ! slapadd -f /tmp/net-ldapapi-slapd.conf \
            -l t/ldap/bootstrap.ldif \
            >/tmp/net-ldapapi-slapadd.log 2>&1; then
            cat /tmp/net-ldapapi-slapadd.log
            exit 1
          fi
          cat /tmp/net-ldapapi-slapadd.log

          slapd_debug_level=0
          if [ "${LDAPAPI_CI_DEBUG:-true}" = true ]; then
            slapd_debug_level="${SLAPD_DEBUG_LEVEL:-16648}"
          fi

          nohup "$slapd_command" -d "$slapd_debug_level" \
            -f /tmp/net-ldapapi-slapd.conf \
            -h 'ldap://127.0.0.1:39010/ ldapi://%2Ftmp%2Fnet-ldapapi-ldapi/' \
            </dev/null > /tmp/net-ldapapi-slapd.log 2>&1 &
          printf '%s\n' "$!" > /tmp/net-ldapapi-slapd.pid

          for _ in $(seq 1 30); do
            if ldapsearch -LLL -x \
              -H ldap://127.0.0.1:39010 \
              -D cn=admin,dc=example,dc=com \
              -w password \
              -b dc=example,dc=com \
              -s base dn >/tmp/net-ldapapi-smoke.out 2>/tmp/net-ldapapi-smoke.err; then
              break
            fi
            sleep 1
          done

          cat /tmp/net-ldapapi-smoke.out
          test -s /tmp/net-ldapapi-smoke.out
          kill -0 "$(cat /tmp/net-ldapapi-slapd.pid)"
          EOF

      - name: Run C SDK SyncRepl Probe
        continue-on-error: true
        run: |
          docker exec --workdir /work "$DEBIAN_TEST_CONTAINER" bash -s <<'EOF'
          set -euxo pipefail

          export PATH="/opt/openldap/bin:/opt/openldap/sbin:$PATH"
          export LD_LIBRARY_PATH=/opt/openldap/lib
          export OPENLDAP_PREFIX=/opt/openldap
          export SYNCPROBE_RESULTS_FILE="/results/$SYNCPROBE_RESULT_FILE"
          export SYNCPROBE_LOG_FILE="/results/diagnostics-source-$OPENLDAP_VERSION-$DEBIAN_SUITE/syncrepl-c-sdk-probe.log"

          test -s /tmp/net-ldapapi-slapd.pid
          kill -0 "$(cat /tmp/net-ldapapi-slapd.pid)"
          bash t/ci/run-syncrepl-c-sdk-probe.sh
          cat "$SYNCPROBE_RESULTS_FILE"
          tail -n 120 "$SYNCPROBE_LOG_FILE"
          test "$(cut -f1 "$SYNCPROBE_RESULTS_FILE")" = PASS
          EOF

      - name: Upload direct C SDK SyncRepl probe result
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: syncrepl-c-sdk-probe-source-${{ matrix.openldap.version }}-${{ matrix.debian.suite }}
          path: ${{ runner.temp }}/cucumber-results/syncrepl-c-sdk-probe-source-${{ matrix.openldap.version }}-${{ matrix.debian.suite }}.tsv
          if-no-files-found: ignore

      - name: Run full Cucumber suite
        timeout-minutes: 15
        run: |
          docker exec --workdir /work "$DEBIAN_TEST_CONTAINER" bash -s <<'EOF'
          set -euxo pipefail

          export HOME=/tmp/net-ldapapi-home
          export PATH="/opt/openldap/bin:/opt/openldap/sbin:$PATH"
          export LD_LIBRARY_PATH=/opt/openldap/lib
          diagnostics_dir="/results/diagnostics-source-$OPENLDAP_VERSION-$DEBIAN_SUITE"
          CUCUMBER_SKIP_FEATURES=''
          CUCUMBER_SKIP_REASON_SERVER_CONTROLS=''
          if [ "$OPENLDAP_SYNCPROV" != true ]; then
            CUCUMBER_SKIP_FEATURES='syncrepl.feature'
          fi
          if [ -n "$OPENLDAP_SERVER_CONTROLS_SKIP_REASON" ]; then
            CUCUMBER_SKIP_FEATURES="$CUCUMBER_SKIP_FEATURES server_controls.feature"
            CUCUMBER_SKIP_REASON_SERVER_CONTROLS="$OPENLDAP_SERVER_CONTROLS_SKIP_REASON"
          elif [ "$OPENLDAP_SSSVLV" != true ]; then
            CUCUMBER_SKIP_FEATURES="$CUCUMBER_SKIP_FEATURES server_controls.feature"
            CUCUMBER_SKIP_REASON_SERVER_CONTROLS='OpenLDAP source predates the sssvlv overlay'
          fi
          export CUCUMBER_SKIP_FEATURES
          export CUCUMBER_SKIP_REASON_SERVER_CONTROLS
          export CUCUMBER_LOG_DIR="$diagnostics_dir/features"
          export CUCUMBER_TIMEOUT_SECONDS=300
          t/ci/run-cucumber-features.sh
          EOF

      - name: Collect Debian diagnostics and stop LDAP test server
        if: ${{ always() }}
        run: |
          set +e
          if docker container inspect "$DEBIAN_TEST_CONTAINER" >/dev/null 2>&1; then
            docker exec --workdir /work "$DEBIAN_TEST_CONTAINER" bash -s <<'EOF'
          set +e

          export HOME=/tmp/net-ldapapi-home
          diagnostics_dir="/results/diagnostics-source-$OPENLDAP_VERSION-$DEBIAN_SUITE"
          mkdir -p "$diagnostics_dir/features" "$diagnostics_dir/cores"

          ps auxww > "$diagnostics_dir/processes-before-cleanup.txt" 2>&1 || true
          if [ -s /tmp/net-ldapapi-slapd.pid ]; then
            slapd_pid="$(cat /tmp/net-ldapapi-slapd.pid)"
            if kill -0 "$slapd_pid" 2>/dev/null; then
              kill "$slapd_pid" 2>/dev/null || true
              for _ in $(seq 1 10); do
                kill -0 "$slapd_pid" 2>/dev/null || break
                sleep 1
              done
              kill -9 "$slapd_pid" 2>/dev/null || true
            fi
          fi

          {
            date -u
            uname -a
            id
            printf 'LDAPAPI_CI_DEBUG=%s\n' "${LDAPAPI_CI_DEBUG:-true}"
            ulimit -a
            if [ -r /proc/sys/kernel/core_pattern ]; then
              printf 'kernel.core_pattern='
              cat /proc/sys/kernel/core_pattern
            fi
          } > "$diagnostics_dir/environment.txt" 2>&1 || true

          env | sort > "$diagnostics_dir/env.txt" 2>&1 || true
          dpkg-query -W > "$diagnostics_dir/packages.txt" 2>&1 || true
          ps auxww > "$diagnostics_dir/processes.txt" 2>&1 || true
          ldd /work/blib/arch/auto/Net/LDAPapi/LDAPapi.so \
            > "$diagnostics_dir/LDAPapi.so.ldd.txt" 2>&1 || true

          for file in \
            /tmp/slapd-version.txt \
            /tmp/net-ldapapi-slapd.conf \
            /tmp/net-ldapapi-slapd.log \
            /tmp/net-ldapapi-slaptest.log \
            /tmp/net-ldapapi-slapadd.log \
            /tmp/net-ldapapi-smoke.out \
            /tmp/net-ldapapi-smoke.err \
            "$HOME/.net-ldapapi-test-config.conf"; do
            if [ -e "$file" ]; then
              cp "$file" "$diagnostics_dir/$(basename "$file")" \
                2>/dev/null || true
            fi
          done

          find /work /tmp -maxdepth 4 -type f \
            \( -name core -o -name 'core.*' -o -name '*.core' \) \
            -exec cp {} "$diagnostics_dir/cores/" \; \
            >/dev/null 2>&1 || true

          if [ "${LDAPAPI_CI_DEBUG:-true}" = true ]; then
            dmesg > "$diagnostics_dir/dmesg.txt" 2>&1 || true
            for log in \
              /var/log/syslog \
              /var/log/messages \
              /var/log/kern.log \
              /var/log/daemon.log; do
              if [ -r "$log" ]; then
                cp "$log" "$diagnostics_dir/$(basename "$log")" \
                  2>/dev/null || true
              fi
            done
            tail -n 250 /tmp/net-ldapapi-slapd.log || true
          else
            cat /tmp/net-ldapapi-slapd.log || true
          fi
          EOF
          fi
          docker rm -f "$DEBIAN_TEST_CONTAINER" >/dev/null 2>&1 || true
          exit 0

      - name: Upload Cucumber feature results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-results-source-${{ matrix.openldap.version }}-${{ matrix.debian.suite }}
          path: ${{ runner.temp }}/cucumber-results/source-${{ matrix.openldap.version }}-${{ matrix.debian.suite }}.tsv
          if-no-files-found: ignore

      - name: Upload Debian diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-source-${{ matrix.openldap.version }}-${{ matrix.debian.suite }}
          path: ${{ runner.temp }}/cucumber-results/diagnostics-source-${{ matrix.openldap.version }}-${{ matrix.debian.suite }}
          if-no-files-found: ignore

  cucumber_freebsd:
    name: OpenLDAP ${{ matrix.openldap.version }} (source on FreeBSD ${{ matrix.freebsd.release }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        freebsd:
          - release: '13.2'
            name: FreeBSD 13.2
        openldap: *openldap_versions
    env:
      FREEBSD_RELEASE: ${{ matrix.freebsd.release }}
      FREEBSD_NAME: ${{ matrix.freebsd.name }}
      OPENLDAP_VERSION: ${{ matrix.openldap.version }}
      OPENLDAP_SHA256: ${{ matrix.openldap.sha256 }}
      OPENLDAP_BACKEND: ${{ matrix.openldap.backend }}
      OPENLDAP_SYNCPROV: ${{ matrix.openldap.syncprov }}
      OPENLDAP_SSSVLV: ${{ matrix.openldap.sssvlv }}
      OPENLDAP_SERVER_CONTROLS_SKIP_REASON: ${{ matrix.openldap.server_controls_skip_reason }}
      BERKELEY_DB_VERSION: ${{ matrix.openldap.berkeley_db }}
      BERKELEY_DB_SHA256: ${{ matrix.openldap.berkeley_db_sha256 }}
      OPENLDAP_PREFIX: /tmp/net-ldapapi-openldap-${{ matrix.openldap.version }}
      OPENLDAP_CACHE_ARCHIVE: ${{ github.workspace }}/.cache/openldap/freebsd-${{ matrix.freebsd.release }}/${{ matrix.openldap.version }}.tar.gz

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Restore FreeBSD OpenLDAP source build
        id: restore-openldap-freebsd
        uses: actions/cache/restore@v4
        with:
          path: .cache/openldap/freebsd-${{ matrix.freebsd.release }}/${{ matrix.openldap.version }}.tar.gz
          key: openldap-source-FreeBSD-${{ matrix.freebsd.release }}-${{ matrix.openldap.version }}-${{ matrix.openldap.sha256 }}-${{ matrix.openldap.backend }}-${{ matrix.openldap.berkeley_db || 'none' }}-v4

      - name: Start FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.freebsd.release }}
          usesh: true
          sync: nfs
          envs: >-
            FREEBSD_RELEASE FREEBSD_NAME
            OPENLDAP_VERSION OPENLDAP_SHA256 OPENLDAP_BACKEND
            OPENLDAP_SYNCPROV OPENLDAP_SSSVLV BERKELEY_DB_VERSION
            BERKELEY_DB_SHA256 OPENLDAP_PREFIX OPENLDAP_CACHE_ARCHIVE
            LDAPAPI_CI_DEBUG
            OPENLDAP_SERVER_CONTROLS_SKIP_REASON
          prepare: |
            pkg install -y \
              bash \
              curl \
              cyrus-sasl \
              gmake \
              groff \
              libltdl \
              p5-Clone \
              p5-Convert-ASN1 \
              p5-Devel-Cover \
              p5-File-Find-Rule \
              p5-File-Slurp \
              p5-IO-Stringy \
              p5-JSON-MaybeXS \
              p5-List-MoreUtils \
              p5-Module-Runtime \
              p5-Moose \
              p5-Path-Class \
              p5-Test-Differences \
              p5-YAML-Syck \
              perl5

      - name: Extract cached OpenLDAP source build in FreeBSD
        if: steps.restore-openldap-freebsd.outputs.cache-hit == 'true'
        shell: freebsd {0}
        run: |
          set -eu

          rm -rf "$OPENLDAP_PREFIX"
          mkdir -p "$OPENLDAP_PREFIX"
          tar -xzf "$OPENLDAP_CACHE_ARCHIVE" -C "$OPENLDAP_PREFIX"
          test -x "$OPENLDAP_PREFIX/libexec/slapd"
          if ls "$OPENLDAP_PREFIX"/lib/libldap*.so* \
            "$OPENLDAP_PREFIX"/lib/liblber*.so* >/dev/null 2>&1; then
            echo 'OpenLDAP shared client libraries are available'
          else
            echo 'OpenLDAP shared client libraries are unavailable; using PIC static client archives'
            test -r "$OPENLDAP_PREFIX/lib/libldap.a"
            test -r "$OPENLDAP_PREFIX/lib/liblber.a"
          fi

      - name: Build OpenLDAP from source in FreeBSD
        if: steps.restore-openldap-freebsd.outputs.cache-hit != 'true'
        shell: freebsd {0}
        run: |
          set -eu

          export PATH="$OPENLDAP_PREFIX/bin:$OPENLDAP_PREFIX/sbin:/usr/local/bin:$PATH"
          export LD_LIBRARY_PATH="$OPENLDAP_PREFIX/lib:/usr/local/lib"
          rm -rf "$OPENLDAP_PREFIX"
          mkdir -p "$OPENLDAP_PREFIX"
          mkdir -p "$(dirname "$OPENLDAP_CACHE_ARCHIVE")"
          rm -f "$OPENLDAP_CACHE_ARCHIVE"

          openldap_archive="/tmp/openldap-$OPENLDAP_VERSION.tgz"
          curl --fail --location --silent --show-error \
            "https://www.openldap.org/software/download/OpenLDAP/openldap-release/openldap-$OPENLDAP_VERSION.tgz" \
            --output "$openldap_archive"
          test "$(sha256 -q "$openldap_archive")" = "$OPENLDAP_SHA256"

          if [ "$OPENLDAP_BACKEND" = bdb ]; then
            berkeley_db_archive="/tmp/db-$BERKELEY_DB_VERSION.tar.gz"
            curl --fail --location --silent --show-error \
              "https://download.oracle.com/berkeley-db/db-$BERKELEY_DB_VERSION.tar.gz" \
              --output "$berkeley_db_archive"
            test "$(sha256 -q "$berkeley_db_archive")" = "$BERKELEY_DB_SHA256"

            rm -rf /tmp/net-ldapapi-berkeley-db
            mkdir -p /tmp/net-ldapapi-berkeley-db
            tar -xzf "$berkeley_db_archive" \
              --strip-components=1 \
              -C /tmp/net-ldapapi-berkeley-db
            cd /tmp/net-ldapapi-berkeley-db/build_unix
            CFLAGS='-O2 -Wno-error=implicit-function-declaration -Wno-error=incompatible-function-pointer-types' \
              ../dist/configure \
                --prefix="$OPENLDAP_PREFIX" \
                --disable-shared \
                --disable-cxx
            gmake -j2
            gmake install
          fi

          openldap_source="/tmp/openldap-$OPENLDAP_VERSION"
          rm -rf "$openldap_source"
          mkdir -p "$openldap_source"
          tar -xzf "$openldap_archive" \
            --strip-components=1 \
            -C "$openldap_source"
          cd "$openldap_source"

          if grep -q '^#elif LDAP_PVT_THREAD_STACK_SIZE == 0' \
            include/ldap_pvt_thread.h; then
            perl -pi -e \
              's/\( 1 \* 1024 \* 1024 \* sizeof\(void \*\) \)/8388608/' \
              include/ldap_pvt_thread.h
          fi
          perl -pi -e \
            's/^#elif defined\( MAXHOSTNAMELEN$/#elif defined( MAXHOSTNAMELEN )/' \
            libraries/libldap/os-ip.c

          configure_args="--prefix=$OPENLDAP_PREFIX --with-cyrus-sasl --without-tls --disable-modules --enable-shared=yes --enable-static=yes"
          if [ "$OPENLDAP_BACKEND" = bdb ]; then
            configure_args="$configure_args --enable-bdb=yes --disable-hdb"
          else
            configure_args="$configure_args --enable-mdb=yes --disable-bdb --disable-hdb"
          fi
          if [ "$OPENLDAP_SYNCPROV" = true ]; then
            configure_args="$configure_args --enable-syncprov=yes"
          fi
          if [ "$OPENLDAP_SSSVLV" = true ]; then
            configure_args="$configure_args --enable-sssvlv=yes"
          fi

          CPPFLAGS="-I$OPENLDAP_PREFIX/include -I/usr/local/include" \
            LDFLAGS="-L$OPENLDAP_PREFIX/lib -L/usr/local/lib" \
            CFLAGS='-O2 -fPIC -Wno-error=implicit-function-declaration -Wno-error=incompatible-function-pointer-types' \
            ./configure $configure_args
          gmake depend
          gmake -j2
          gmake install

          test -x "$OPENLDAP_PREFIX/libexec/slapd"
          if ls "$OPENLDAP_PREFIX"/lib/libldap*.so* \
            "$OPENLDAP_PREFIX"/lib/liblber*.so* >/dev/null 2>&1; then
            echo 'OpenLDAP shared client libraries are available'
          else
            echo 'OpenLDAP shared client libraries are unavailable; using PIC static client archives'
            test -r "$OPENLDAP_PREFIX/lib/libldap.a"
            test -r "$OPENLDAP_PREFIX/lib/liblber.a"
          fi
          tar -czf "$OPENLDAP_CACHE_ARCHIVE" -C "$OPENLDAP_PREFIX" .

      - name: Save FreeBSD OpenLDAP source build
        if: steps.restore-openldap-freebsd.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/openldap/freebsd-${{ matrix.freebsd.release }}/${{ matrix.openldap.version }}.tar.gz
          key: ${{ steps.restore-openldap-freebsd.outputs.cache-primary-key }}

      - name: Install Cucumber 0.34 and build Net::LDAPapi in FreeBSD
        shell: freebsd {0}
        run: |
          set -eu

          export PATH="$OPENLDAP_PREFIX/bin:$OPENLDAP_PREFIX/sbin:/usr/local/bin:$PATH"
          export LD_LIBRARY_PATH="$OPENLDAP_PREFIX/lib:/usr/local/lib"
          "$OPENLDAP_PREFIX/libexec/slapd" -VV \
            >/tmp/slapd-version.txt 2>&1 || true
          cat /tmp/slapd-version.txt
          grep -F "$OPENLDAP_VERSION" /tmp/slapd-version.txt

          perl_prefix=/tmp/net-ldapapi-perl5
          rm -rf "$perl_prefix"
          mkdir -p "$perl_prefix"
          export PATH="$perl_prefix/bin:$PATH"
          export PERL5LIB="$perl_prefix/lib/perl5"

          number_range_archive=/tmp/Number-Range-0.12.tar.gz
          curl --fail --location --silent --show-error \
            https://cpan.metacpan.org/authors/id/L/LA/LARRYSH/Number-Range-0.12.tar.gz \
            --output "$number_range_archive"
          test "$(sha256 -q "$number_range_archive")" = \
            433e821ac44ab6164c7e92b60ff7afa60a279bc550134c82ceb70b3ef4ee2925
          rm -rf /tmp/Number-Range-0.12
          tar -xzf "$number_range_archive" -C /tmp
          cd /tmp/Number-Range-0.12
          perl Makefile.PL INSTALL_BASE="$perl_prefix"
          gmake install
          perl -MNumber::Range -e \
            'die "Expected Number::Range 0.12, found $Number::Range::VERSION\n" if $Number::Range::VERSION ne "0.12"'

          cucumber_archive=/tmp/Test-BDD-Cucumber-0.34.tar.gz
          curl --fail --location --silent --show-error \
            https://cpan.metacpan.org/authors/id/S/SA/SARGIE/Test-BDD-Cucumber-0.34.tar.gz \
            --output "$cucumber_archive"
          test "$(sha256 -q "$cucumber_archive")" = \
            be3184806292a9bf2d24c284ad76180b372221d0de0969decdb797236a3250b7
          rm -rf /tmp/Test-BDD-Cucumber-0.34
          tar -xzf "$cucumber_archive" -C /tmp
          cd /tmp/Test-BDD-Cucumber-0.34
          perl Makefile.PL INSTALL_BASE="$perl_prefix"
          gmake install
          perl -MTest::BDD::Cucumber -e \
            'die "Expected Test::BDD::Cucumber 0.34, found $Test::BDD::Cucumber::VERSION\n" if $Test::BDD::Cucumber::VERSION ne "0.34"'

          work_dir=/tmp/net-ldapapi-work
          rm -rf "$work_dir"
          mkdir -p "$work_dir"
          cp -R "$GITHUB_WORKSPACE/." "$work_dir/"
          cd "$work_dir"

          perl -pi -e \
            's/\$VERSION = \x273\.0\.x\x27;/\$VERSION = \x273.000999\x27;/' \
            LDAPapi.pm
          grep -F "\$VERSION = '3.000999';" LDAPapi.pm

          perl Makefile.PL \
            -sdk openldap \
            -include_path "$OPENLDAP_PREFIX/include" \
            -lib_path "$OPENLDAP_PREFIX/lib" \
            -sasl_include_path /usr/local/include/sasl
          perl -0pi -e '
            BEGIN { $sasl = " -L/usr/local/lib -lsasl2" }
            $found += s/^(EXTRALIBS = .*)$/$1$sasl/m;
            $found += s/^(LDLOADLIBS = .*)$/$1$sasl/m;
            END { die "Could not add Cyrus SASL libraries to generated Makefile\n" unless $found == 2 }
          ' Makefile
          grep -E '^(EXTRALIBS|LDLOADLIBS) = .* -lsasl2' Makefile
          gmake

      - name: Start FreeBSD LDAP test environment
        shell: freebsd {0}
        run: |
          set -eu
          ulimit -c unlimited || true

          perl_prefix=/tmp/net-ldapapi-perl5
          work_dir=/tmp/net-ldapapi-work
          export PATH="$perl_prefix/bin:$OPENLDAP_PREFIX/bin:$OPENLDAP_PREFIX/sbin:/usr/local/bin:$PATH"
          export PERL5LIB="$perl_prefix/lib/perl5"
          export LD_LIBRARY_PATH="$OPENLDAP_PREFIX/lib:/usr/local/lib"
          export HOME=/tmp/net-ldapapi-home
          cd "$work_dir"

          results_dir="$GITHUB_WORKSPACE/.ci-results"
          result_file="$results_dir/freebsd-$FREEBSD_RELEASE-$OPENLDAP_VERSION.tsv"
          status_file="$results_dir/freebsd-$FREEBSD_RELEASE-$OPENLDAP_VERSION.status"
          diagnostics_dir="$GITHUB_WORKSPACE/.ci-diagnostics/freebsd-$FREEBSD_RELEASE-$OPENLDAP_VERSION"
          state_dir="/tmp/net-ldapapi-ci-state-$OPENLDAP_VERSION"
          rm -rf "$diagnostics_dir" "$state_dir"
          mkdir -p "$results_dir" "$diagnostics_dir/features" "$diagnostics_dir/cores" "$HOME" "$state_dir"
          rm -f "$result_file" "$status_file"

          cat > "$HOME/.net-ldapapi-test-config.conf" <<'PERL'
          $RunDeveloperTests = 1;
          $TestConfig{'ldap'}{'server'}{'tcp'}{'-host'} = '127.0.0.1';
          $TestConfig{'ldap'}{'server'}{'tcp'}{'-port'} = 39010;
          $TestConfig{'ldap'}{'server'}{'ldapi'}{'-url'} = 'ldapi://%2Ftmp%2Fnet-ldapapi-ldapi/';
          1;
          PERL
          skip_legacy_sasl=false
          case "$OPENLDAP_VERSION" in
            2.3.43|2.4.6|2.4.7|2.4.8|2.4.9|2.4.10|2.4.11|2.4.12|2.4.13|2.4.14|2.4.15)
              skip_legacy_sasl=true
              ;;
          esac
          if [ "$skip_legacy_sasl" = true ]; then
            printf '%s\n' \
              "\$TestConfig{'ldap'}{'bind_types'}{'sasl'}{'enabled'} = 0;" \
              '1;' \
              >> "$HOME/.net-ldapapi-test-config.conf"
          fi

          slapd_conf=/tmp/net-ldapapi-slapd.conf
          cp t/ldap/slapd.conf "$slapd_conf"
          schema_dir="$OPENLDAP_PREFIX/etc/openldap/schema"
          test -r "$schema_dir/core.schema"
          test -r "$schema_dir/cosine.schema"
          test -r "$schema_dir/inetorgperson.schema"
          perl -pi -e "s#/etc/ldap/schema/#$schema_dir/#g" "$slapd_conf"
          perl -ni -e 'print unless /^module(?:path|load)[[:space:]]/' "$slapd_conf"
          if [ "$OPENLDAP_BACKEND" = bdb ]; then
            perl -pi -e 's/^database[[:space:]]+mdb$/database        bdb/' \
              "$slapd_conf"
            perl -ni -e 'print unless /^maxsize[[:space:]]/' "$slapd_conf"
          fi
          if [ "$OPENLDAP_SYNCPROV" != true ]; then
            perl -ni -e 'print unless /^overlay[[:space:]]+syncprov$/' \
              "$slapd_conf"
          fi
          if [ "$OPENLDAP_SSSVLV" != true ]; then
            perl -ni -e 'print unless /^overlay[[:space:]]+sssvlv$/' \
              "$slapd_conf"
          fi

          rm -rf /tmp/net-ldapapi-slapd-data /tmp/net-ldapapi-ldapi
          mkdir -p /tmp/net-ldapapi-slapd-data
          if ! "$OPENLDAP_PREFIX/sbin/slaptest" -f "$slapd_conf" -u \
            >/tmp/net-ldapapi-slaptest.log 2>&1; then
            cat /tmp/net-ldapapi-slaptest.log
            exit 1
          fi
          cat /tmp/net-ldapapi-slaptest.log
          if ! "$OPENLDAP_PREFIX/sbin/slapadd" \
            -f "$slapd_conf" \
            -l t/ldap/bootstrap.ldif \
            >/tmp/net-ldapapi-slapadd.log 2>&1; then
            cat /tmp/net-ldapapi-slapadd.log
            exit 1
          fi
          cat /tmp/net-ldapapi-slapadd.log

          slapd_debug_level=0
          if [ "${LDAPAPI_CI_DEBUG:-true}" = true ]; then
            slapd_debug_level="${SLAPD_DEBUG_LEVEL:-16648}"
          fi

          /usr/sbin/daemon \
            -p "$state_dir/slapd.pid" \
            -o /tmp/net-ldapapi-slapd.log \
            "$OPENLDAP_PREFIX/libexec/slapd" \
            -d "$slapd_debug_level" \
            -f "$slapd_conf" \
            -h 'ldap://127.0.0.1:39010/ ldapi://%2Ftmp%2Fnet-ldapapi-ldapi/'

          attempt=0
          while [ "$attempt" -lt 30 ]; do
            if "$OPENLDAP_PREFIX/bin/ldapsearch" -LLL -x \
              -H ldap://127.0.0.1:39010 \
              -D cn=admin,dc=example,dc=com \
              -w password \
              -b dc=example,dc=com \
              -s base dn \
              >/tmp/net-ldapapi-smoke.out \
              2>/tmp/net-ldapapi-smoke.err; then
              break
            fi
            attempt=$((attempt + 1))
            sleep 1
          done
          cat /tmp/net-ldapapi-smoke.out
          test -s /tmp/net-ldapapi-smoke.out
          test -s "$state_dir/slapd.pid"
          kill -0 "$(cat "$state_dir/slapd.pid")"

      - name: Run C SDK SyncRepl Probe
        continue-on-error: true
        shell: freebsd {0}
        run: |
          set -eu

          perl_prefix=/tmp/net-ldapapi-perl5
          work_dir=/tmp/net-ldapapi-work
          results_dir="$GITHUB_WORKSPACE/.ci-results"
          diagnostics_dir="$GITHUB_WORKSPACE/.ci-diagnostics/freebsd-$FREEBSD_RELEASE-$OPENLDAP_VERSION"
          state_dir="/tmp/net-ldapapi-ci-state-$OPENLDAP_VERSION"
          export PATH="$perl_prefix/bin:$OPENLDAP_PREFIX/bin:$OPENLDAP_PREFIX/sbin:/usr/local/bin:$PATH"
          export PERL5LIB="$perl_prefix/lib/perl5"
          export LD_LIBRARY_PATH="$OPENLDAP_PREFIX/lib:/usr/local/lib"
          cd "$work_dir"

          test -s "$state_dir/slapd.pid"
          kill -0 "$(cat "$state_dir/slapd.pid")"
          export SYNCPROBE_RESULTS_FILE="$results_dir/syncrepl-c-sdk-probe-freebsd-$FREEBSD_RELEASE-$OPENLDAP_VERSION.tsv"
          export SYNCPROBE_LOG_FILE="$diagnostics_dir/syncrepl-c-sdk-probe.log"
          export SYNCPROBE_SASL_LIB_DIR=/usr/local/lib
          bash t/ci/run-syncrepl-c-sdk-probe.sh
          cat "$SYNCPROBE_RESULTS_FILE"
          tail -n 120 "$SYNCPROBE_LOG_FILE"
          test "$(cut -f1 "$SYNCPROBE_RESULTS_FILE")" = PASS

      - name: Upload FreeBSD direct C SDK SyncRepl probe result
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: syncrepl-c-sdk-probe-freebsd-${{ matrix.freebsd.release }}-${{ matrix.openldap.version }}
          path: .ci-results/syncrepl-c-sdk-probe-freebsd-${{ matrix.freebsd.release }}-${{ matrix.openldap.version }}.tsv
          if-no-files-found: ignore

      - name: Run full Cucumber suite in FreeBSD
        timeout-minutes: 15
        shell: freebsd {0}
        run: |
          set -eu

          perl_prefix=/tmp/net-ldapapi-perl5
          work_dir=/tmp/net-ldapapi-work
          results_dir="$GITHUB_WORKSPACE/.ci-results"
          result_file="$results_dir/freebsd-$FREEBSD_RELEASE-$OPENLDAP_VERSION.tsv"
          status_file="$results_dir/freebsd-$FREEBSD_RELEASE-$OPENLDAP_VERSION.status"
          diagnostics_dir="$GITHUB_WORKSPACE/.ci-diagnostics/freebsd-$FREEBSD_RELEASE-$OPENLDAP_VERSION"
          state_dir="/tmp/net-ldapapi-ci-state-$OPENLDAP_VERSION"
          export PATH="$perl_prefix/bin:$OPENLDAP_PREFIX/bin:$OPENLDAP_PREFIX/sbin:/usr/local/bin:$PATH"
          export PERL5LIB="$perl_prefix/lib/perl5"
          export LD_LIBRARY_PATH="$OPENLDAP_PREFIX/lib:/usr/local/lib"
          export HOME=/tmp/net-ldapapi-home
          cd "$work_dir"

          test -s "$state_dir/slapd.pid"
          kill -0 "$(cat "$state_dir/slapd.pid")"
          CUCUMBER_SKIP_FEATURES=''
          CUCUMBER_SKIP_REASON_SERVER_CONTROLS=''
          if [ "$OPENLDAP_SYNCPROV" != true ]; then
            CUCUMBER_SKIP_FEATURES='syncrepl.feature'
          fi
          if [ -n "$OPENLDAP_SERVER_CONTROLS_SKIP_REASON" ]; then
            CUCUMBER_SKIP_FEATURES="$CUCUMBER_SKIP_FEATURES server_controls.feature"
            CUCUMBER_SKIP_REASON_SERVER_CONTROLS="$OPENLDAP_SERVER_CONTROLS_SKIP_REASON"
          elif [ "$OPENLDAP_SSSVLV" != true ]; then
            CUCUMBER_SKIP_FEATURES="$CUCUMBER_SKIP_FEATURES server_controls.feature"
            CUCUMBER_SKIP_REASON_SERVER_CONTROLS='OpenLDAP source predates the sssvlv overlay'
          fi
          export CUCUMBER_SKIP_FEATURES
          export CUCUMBER_SKIP_REASON_SERVER_CONTROLS
          export CUCUMBER_RESULTS_FILE="$result_file"
          export CUCUMBER_TIMEOUT_SECONDS=300
          export CUCUMBER_LOG_DIR="$diagnostics_dir/features"

          set +e
          t/ci/run-cucumber-features.sh
          suite_status=$?
          set -e
          printf '%s\n' "$suite_status" > "$status_file"

      - name: Collect FreeBSD diagnostics and stop LDAP test server
        if: ${{ always() }}
        shell: freebsd {0}
        run: |
          set +e

          perl_prefix=/tmp/net-ldapapi-perl5
          work_dir=/tmp/net-ldapapi-work
          diagnostics_dir="$GITHUB_WORKSPACE/.ci-diagnostics/freebsd-$FREEBSD_RELEASE-$OPENLDAP_VERSION"
          state_dir="/tmp/net-ldapapi-ci-state-$OPENLDAP_VERSION"
          export PATH="$perl_prefix/bin:$OPENLDAP_PREFIX/bin:$OPENLDAP_PREFIX/sbin:/usr/local/bin:$PATH"
          export PERL5LIB="$perl_prefix/lib/perl5"
          export LD_LIBRARY_PATH="$OPENLDAP_PREFIX/lib:/usr/local/lib"
          export HOME=/tmp/net-ldapapi-home
          mkdir -p "$diagnostics_dir/features" "$diagnostics_dir/cores"

          ps auxww > "$diagnostics_dir/processes-before-cleanup.txt" 2>&1 || true
          if [ -s "$state_dir/slapd.pid" ]; then
            slapd_pid="$(cat "$state_dir/slapd.pid")"
            if kill -0 "$slapd_pid" 2>/dev/null; then
              kill "$slapd_pid" 2>/dev/null || true
              for _ in $(seq 1 10); do
                kill -0 "$slapd_pid" 2>/dev/null || break
                sleep 1
              done
              kill -9 "$slapd_pid" 2>/dev/null || true
            fi
          fi

          {
            date -u
            uname -a
            id
            printf 'LDAPAPI_CI_DEBUG=%s\n' "${LDAPAPI_CI_DEBUG:-true}"
            ulimit -a
            sysctl kern.corefile 2>/dev/null || true
          } > "$diagnostics_dir/environment.txt" 2>&1 || true

          env | sort > "$diagnostics_dir/env.txt" 2>&1 || true
          pkg info > "$diagnostics_dir/packages.txt" 2>&1 || true
          ps auxww > "$diagnostics_dir/processes.txt" 2>&1 || true
          ldd "$work_dir/blib/arch/auto/Net/LDAPapi/LDAPapi.so" \
            > "$diagnostics_dir/LDAPapi.so.ldd.txt" 2>&1 || true

          for file in \
            /tmp/slapd-version.txt \
            /tmp/net-ldapapi-slapd.conf \
            /tmp/net-ldapapi-slapd.log \
            /tmp/net-ldapapi-slaptest.log \
            /tmp/net-ldapapi-slapadd.log \
            /tmp/net-ldapapi-smoke.out \
            /tmp/net-ldapapi-smoke.err \
            "$HOME/.net-ldapapi-test-config.conf"; do
            if [ -e "$file" ]; then
              cp "$file" "$diagnostics_dir/$(basename "$file")" \
                2>/dev/null || true
            fi
          done

          find "$work_dir" /tmp -maxdepth 4 -type f \
            \( -name core -o -name 'core.*' -o -name '*.core' \) \
            -exec cp {} "$diagnostics_dir/cores/" \; \
            >/dev/null 2>&1 || true

          if [ "${LDAPAPI_CI_DEBUG:-true}" = true ]; then
            dmesg > "$diagnostics_dir/dmesg.txt" 2>&1 || true
            for log in \
              /var/log/messages \
              /var/log/debug.log \
              /var/log/all.log; do
              if [ -r "$log" ]; then
                cp "$log" "$diagnostics_dir/$(basename "$log")" \
                  2>/dev/null || true
              fi
            done
            tail -n 250 /tmp/net-ldapapi-slapd.log || true
          else
            cat /tmp/net-ldapapi-slapd.log || true
          fi
          rm -f "$state_dir/slapd.pid"
          exit 0

      - name: Upload FreeBSD Cucumber feature results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-results-freebsd-${{ matrix.freebsd.release }}-${{ matrix.openldap.version }}
          path: .ci-results/freebsd-${{ matrix.freebsd.release }}-${{ matrix.openldap.version }}.tsv
          if-no-files-found: ignore

      - name: Upload FreeBSD diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-freebsd-${{ matrix.freebsd.release }}-${{ matrix.openldap.version }}
          path: .ci-diagnostics/freebsd-${{ matrix.freebsd.release }}-${{ matrix.openldap.version }}
          if-no-files-found: ignore

      - name: Enforce FreeBSD Cucumber result
        if: ${{ always() }}
        run: |
          status_file=".ci-results/freebsd-${{ matrix.freebsd.release }}-${{ matrix.openldap.version }}.status"
          if [ ! -s "$status_file" ]; then
            echo 'FreeBSD test run did not record a Cucumber status' >&2
            exit 1
          fi
          test "$(cat "$status_file")" -eq 0

  summarize:
    name: Summarize source-build matrix
    if: ${{ always() }}
    needs:
      - cucumber
      - cucumber_freebsd
    runs-on: ubuntu-latest
    steps:
      - name: Download Cucumber feature results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: cucumber-results-*
          path: cucumber-results
          merge-multiple: true

      - name: Download direct C SDK SyncRepl probe results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: syncrepl-c-sdk-probe-*
          path: syncrepl-c-sdk-probe-results
          merge-multiple: true

      - name: Publish pass/fail matrix
        id: matrix-summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const cucumberResultsByLane = new Map();
            const syncreplProbeResultsByLane = new Map();
            if (fs.existsSync('cucumber-results')) {
              for (const file of fs.readdirSync('cucumber-results')) {
                if (!file.endsWith('.tsv')) {
                  continue;
                }
                const cucumberResults = fs.readFileSync(
                  `cucumber-results/${file}`,
                  'utf8',
                ).trim().split('\n').filter(Boolean).map((line) => {
                  const [status, feature, scenario, step, detail] = line.split('\t');
                  return { status, feature, scenario, step, detail };
                });
                cucumberResultsByLane.set(
                  file.replace(/\.tsv$/, ''),
                  cucumberResults,
                );
              }
            }
            if (fs.existsSync('syncrepl-c-sdk-probe-results')) {
              for (const file of fs.readdirSync('syncrepl-c-sdk-probe-results')) {
                if (!file.endsWith('.tsv')) {
                  continue;
                }
                const [resultLine] = fs.readFileSync(
                  `syncrepl-c-sdk-probe-results/${file}`,
                  'utf8',
                ).trim().split('\n').filter(Boolean);
                if (!resultLine) {
                  continue;
                }
                const [status, stage, detail] = resultLine.split('\t');
                syncreplProbeResultsByLane.set(
                  file
                    .replace(/^syncrepl-c-sdk-probe-/, '')
                    .replace(/\.tsv$/, ''),
                  { status, stage, detail },
                );
              }
            }
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              },
            );

            const results = jobs.flatMap((job) => {
              if (job.conclusion === 'skipped') {
                return [];
              }
              const debianMatch = job.name.match(
                /^OpenLDAP ([0-9.]+) \(source on Debian (Wheezy|Jessie)\)$/,
              );
              const freebsdMatch = job.name.match(
                /^OpenLDAP ([0-9.]+) \(source on FreeBSD ([0-9.]+)\)$/,
              );
              if (!debianMatch && !freebsdMatch) {
                return [];
              }

              const version = debianMatch ? debianMatch[1] : freebsdMatch[1];
              const platform = debianMatch ? debianMatch[2] : `FreeBSD ${freebsdMatch[2]}`;
              const resultKey = debianMatch
                ? `source-${version}-${platform.toLowerCase()}`
                : `freebsd-${freebsdMatch[2]}-${version}`;

              const failedStep = (job.steps || []).find(
                (step) => !['success', 'skipped'].includes(step.conclusion),
              );
              const result = job.conclusion === 'success'
                ? 'PASS'
                : (job.conclusion || 'unknown').toUpperCase();
              const cucumberResults = cucumberResultsByLane.get(
                resultKey,
              ) || [];
              const featureFailures = cucumberResults.filter(
                (item) => item.status === 'FAIL',
              );
              const skippedFeatures = cucumberResults.filter(
                (item) => item.status === 'SKIP',
              ).map((item) => ({
                feature: item.feature,
                detail: item.detail,
              }));
              const failedFeature = featureFailures.length
                ? featureFailures.map((item) => item.feature).join('<br>')
                : '';
              const failedScenarioStep = featureFailures.length
                ? featureFailures.map((item) => (
                  item.scenario
                    ? `${item.scenario}: ${item.step}`
                    : item.step
                )).join('<br>')
                : '';
              const failedWorkflowStep = featureFailures.length
                ? ''
                : (failedStep ? failedStep.name : '');
              const failureDetail = featureFailures.length
                ? featureFailures.map((item) => item.detail).join('<br>')
                : (result === 'PASS'
                  ? ''
                  : 'Workflow failed before a Cucumber feature result was recorded');

              return [{
                version,
                platform,
                result,
                failedWorkflowStep,
                failedFeature,
                failedScenarioStep,
                failureDetail,
                skippedFeatures,
                resultKey,
                url: job.html_url,
              }];
            });

            const versions = [...new Set(results.map((item) => item.version))]
              .sort((left, right) => left.localeCompare(
                right,
                undefined,
                { numeric: true },
            ));
            const resultByLane = new Map(
              results.map((item) => [`${item.version}:${item.platform}`, item]),
            );
            const platforms = [...new Set(results.map((item) => item.platform))]
              .sort((left, right) => left.localeCompare(
                right,
                undefined,
                { numeric: true },
              ));
            const matrixCell = (version, platform) => {
              const item = resultByLane.get(`${version}:${platform}`);
              if (!item) {
                return 'NOT REPORTED';
              }
              if (item.result === 'PASS') {
                return item.skippedFeatures.length
                  ? `PASS (SKIP: ${item.skippedFeatures.map((skip) => (
                    `${skip.feature}: ${skip.detail}`
                  )).join('<br>')})`
                  : 'PASS';
              }
              return [
                item.result,
                item.failedWorkflowStep,
                item.failedFeature,
                item.failedScenarioStep,
                item.skippedFeatures.length
                  ? `SKIP: ${item.skippedFeatures.map((skip) => (
                    `${skip.feature}: ${skip.detail}`
                  )).join('<br>')}`
                  : '',
              ].filter(Boolean).join(' - ');
            };
            const escapeCell = (value) => value.replace(/\|/g, '\\|');

            const lines = [
              '# OpenLDAP source-build results',
              '',
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              `| OpenLDAP | ${platforms.join(' | ')} |`,
              `|---|${platforms.map(() => '---').join('|')}|`,
              ...versions.map((version) => (
                `| ${version} | ${platforms.map((platform) => (
                  escapeCell(matrixCell(version, platform))
                )).join(' | ')} |`
              )),
            ];
            lines.push(
              '',
              'SKIP marks a compatibility-lane exclusion; its stated reason records whether the selected OpenLDAP source lacks an overlay or has a known server defect.',
            );

            const syncreplProbeResults = results
              .map((item) => ({
                ...item,
                probe: syncreplProbeResultsByLane.get(item.resultKey),
              }));
            if (syncreplProbeResults.length) {
              const probeResultByLane = new Map(
                syncreplProbeResults.map((item) => [
                  `${item.version}:${item.platform}`,
                  item,
                ]),
              );
              const syncreplProbeCell = (version, platform) => {
                const item = probeResultByLane.get(`${version}:${platform}`);
                if (!item || !item.probe) {
                  return 'NOT REPORTED';
                }
                if (item.probe.status === 'PASS') {
                  return 'PASS';
                }
                return [
                  item.probe.status || 'FAILURE',
                  item.probe.stage,
                  item.probe.detail,
                ].filter(Boolean).join(' - ');
              };
              lines.push(
                '',
                '## Direct OpenLDAP C SDK SyncRepl probe',
                '',
                'This probe runs in every historical source-build cell and uses the same bind, persistent Sync Request, mutations, polling, and Cancel sequence as `syncrepl.feature`, without the Perl/XS layer.',
                '',
                `| OpenLDAP | ${platforms.join(' | ')} |`,
                `|---|${platforms.map(() => '---').join('|')}|`,
                ...versions.map((version) => (
                  `| ${version} | ${platforms.map((platform) => (
                    escapeCell(syncreplProbeCell(version, platform))
                  )).join(' | ')} |`
                )),
              );
            }

            const failures = results.filter((item) => item.result !== 'PASS');
            if (failures.length) {
              lines.push(
                '',
                '## Failed lanes',
                '',
                '| OpenLDAP | Platform | Result | Failed workflow step | Failed feature | Failed scenario step | Skipped feature(s) | Detail | Job |',
                '|---|---|---|---|---|---|---|---|---|',
                ...failures
                  .sort((left, right) => (
                    left.version.localeCompare(
                      right.version,
                      undefined,
                      { numeric: true },
                    ) || left.platform.localeCompare(right.platform)
                  ))
                  .map((item) => [
                    `| ${item.version}`,
                    item.platform,
                    item.result,
                    escapeCell(item.failedWorkflowStep || '-'),
                    escapeCell(item.failedFeature || '-'),
                    escapeCell(item.failedScenarioStep || 'Not reported'),
                    escapeCell(item.skippedFeatures.map((skip) => (
                      `${skip.feature}: ${skip.detail}`
                    )).join('<br>') || '-'),
                    escapeCell(item.failureDetail || '-'),
                    `[logs](${item.url}) |`,
                  ].join(' | ')),
              );
            } else {
              lines.push('', 'All lanes passed.');
            }

            const summary = `${lines.join('\n')}\n`;
            fs.writeFileSync('openldap-source-matrix.md', summary);
            core.info(summary);
            await core.summary.addRaw(summary).write();

      - name: Upload pass/fail matrix
        if: steps.matrix-summary.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openldap-source-matrix
          path: openldap-source-matrix.md
          if-no-files-found: error
