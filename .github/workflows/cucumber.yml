name: OpenLDAP compatibility

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  cucumber:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: OpenLDAP 2.4.31 (Debian Wheezy)
            image: debian:wheezy
            expected_openldap: 2.4.31
            debian_archive: true
            debian_suite: wheezy
            cucumber_from_cpan: true
          - name: OpenLDAP 2.4.40 (Debian Jessie)
            image: debian:jessie
            expected_openldap: 2.4.40
            debian_archive: true
            debian_suite: jessie
            cucumber_from_cpan: true
          - name: OpenLDAP 2.5.13 (Debian Bookworm)
            image: debian:bookworm
            expected_openldap: 2.5.13
            debian_archive: false
            cucumber_from_cpan: false
          - name: OpenLDAP 2.6.10 (Debian Trixie)
            image: debian:trixie
            expected_openldap: 2.6.10
            debian_archive: false
            cucumber_from_cpan: false

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run full Cucumber suite
        env:
          IMAGE: ${{ matrix.image }}
          EXPECTED_OPENLDAP: ${{ matrix.expected_openldap }}
          DEBIAN_ARCHIVE: ${{ matrix.debian_archive }}
          DEBIAN_SUITE: ${{ matrix.debian_suite }}
          CUCUMBER_FROM_CPAN: ${{ matrix.cucumber_from_cpan }}
        run: |
          result_dir="$RUNNER_TEMP/cucumber-results"
          result_file="binary-$EXPECTED_OPENLDAP.tsv"
          mkdir -p "$result_dir"
          docker run --rm --interactive \
            --volume "$PWD:/src:ro" \
            --volume "$result_dir:/results" \
            --workdir /work \
            --env EXPECTED_OPENLDAP="$EXPECTED_OPENLDAP" \
            --env DEBIAN_ARCHIVE="$DEBIAN_ARCHIVE" \
            --env DEBIAN_SUITE="$DEBIAN_SUITE" \
            --env CUCUMBER_FROM_CPAN="$CUCUMBER_FROM_CPAN" \
            --env CUCUMBER_RESULTS_FILE="/results/$result_file" \
            "$IMAGE" \
            bash -s <<'EOF'
          set -euxo pipefail

          export DEBIAN_FRONTEND=noninteractive
          export HOME=/tmp/net-ldapapi-home

          cp -a /src/. /work/
          sed -i "s/\$VERSION = '3\.0\.x';/\$VERSION = '3.000999';/" LDAPapi.pm
          grep -F "\$VERSION = '3.000999';" LDAPapi.pm

          if [ "$DEBIAN_ARCHIVE" = "true" ]; then
            cucumber_packages=(libtest-bdd-cucumber-perl)
            if [ "$CUCUMBER_FROM_CPAN" = "true" ]; then
              cucumber_packages=(
                curl
                libclone-perl
                libfile-find-rule-perl
                libfile-slurp-perl
                libio-stringy-perl
                libjson-pp-perl
                libjson-xs-perl
                liblist-moreutils-perl
                libmoose-perl
                libnumber-range-perl
                libpath-class-perl
                libtest-differences-perl
                libyaml-syck-perl
              )
            fi

            printf '%s\n' \
              "deb http://archive.debian.org/debian $DEBIAN_SUITE main" \
              "deb http://archive.debian.org/debian-security $DEBIAN_SUITE/updates main" \
              > /etc/apt/sources.list
            printf '%s\n' 'Acquire::Check-Valid-Until "false";' \
              > /etc/apt/apt.conf.d/99archive
            apt-get -o Acquire::Check-Valid-Until=false update
            apt-get -o Acquire::Check-Valid-Until=false \
              --allow-unauthenticated \
              install -y --no-install-recommends \
              build-essential \
              ca-certificates \
              ldap-utils \
              libconvert-asn1-perl \
              libdevel-cover-perl \
              libldap2-dev \
              libsasl2-dev \
              "${cucumber_packages[@]}" \
              slapd
          else
            apt-get update
            apt-get install -y --no-install-recommends \
              build-essential \
              ca-certificates \
              ldap-utils \
              libconvert-asn1-perl \
              libdevel-cover-perl \
              libldap2-dev \
              libsasl2-dev \
              libtest-bdd-cucumber-perl \
              slapd
          fi

          if [ "$CUCUMBER_FROM_CPAN" = "true" ]; then
            if [ "$DEBIAN_SUITE" = "wheezy" ]; then
              printf '%s\n' \
                'deb http://archive.debian.org/debian jessie main' \
                > /etc/apt/sources.list.d/jessie.list
              apt-get -o Acquire::Check-Valid-Until=false update
            fi
            apt-get -o Acquire::Check-Valid-Until=false \
              --allow-unauthenticated \
              install -y --no-install-recommends \
              libjson-maybexs-perl=1.002006-1 \
              libjson-pp-perl=2.27300-2
            curl --fail --location --silent --show-error \
              http://cpan.metacpan.org/authors/id/S/SA/SARGIE/Test-BDD-Cucumber-0.34.tar.gz \
              --output /tmp/Test-BDD-Cucumber-0.34.tar.gz
            printf '%s  %s\n' \
              be3184806292a9bf2d24c284ad76180b372221d0de0969decdb797236a3250b7 \
              /tmp/Test-BDD-Cucumber-0.34.tar.gz \
              | sha256sum --check
            tar --extract --gzip \
              --file /tmp/Test-BDD-Cucumber-0.34.tar.gz \
              --directory /tmp
            cd /tmp/Test-BDD-Cucumber-0.34
            perl Makefile.PL
            make install
            perl -MTest::BDD::Cucumber -e \
              'die "Expected Test::BDD::Cucumber 0.34, found $Test::BDD::Cucumber::VERSION\n" if $Test::BDD::Cucumber::VERSION ne "0.34"'
            cd /work
          fi

          perl -MTest::BDD::Cucumber -e 'print "$Test::BDD::Cucumber::VERSION\n"'

          slapd -VV > /tmp/slapd-version.txt 2>&1 || true
          cat /tmp/slapd-version.txt
          grep -F "$EXPECTED_OPENLDAP" /tmp/slapd-version.txt

          multiarch="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
          perl Makefile.PL \
            -sdk openldap \
            -include_path /usr/include \
            -lib_path "/usr/lib/$multiarch" \
            -sasl_include_path /usr/include/sasl
          make

          mkdir -p "$HOME"
          cat > "$HOME/.net-ldapapi-test-config.conf" <<'PERL'
          $RunDeveloperTests = 1;
          $TestConfig{'ldap'}{'server'}{'tcp'}{'-host'} = '127.0.0.1';
          $TestConfig{'ldap'}{'server'}{'tcp'}{'-port'} = 39010;
          1;
          PERL

          rm -rf /tmp/net-ldapapi-slapd-data
          install -d /tmp/net-ldapapi-slapd-data /run/slapd /var/run/slapd
          slaptest -f t/ldap/slapd.conf -u
          slapadd -f t/ldap/slapd.conf -l t/ldap/bootstrap.ldif

          slapd -f t/ldap/slapd.conf \
            -h 'ldap://127.0.0.1:39010/ ldapi:///' \
            > /tmp/net-ldapapi-slapd.log 2>&1 &
          slapd_pid="$!"

          cleanup() {
            kill "$slapd_pid" 2>/dev/null || true
            wait "$slapd_pid" 2>/dev/null || true
            cat /tmp/net-ldapapi-slapd.log || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if ldapsearch -LLL -x \
              -H ldap://127.0.0.1:39010 \
              -D cn=admin,dc=example,dc=com \
              -w password \
              -b dc=example,dc=com \
              -s base dn >/tmp/net-ldapapi-smoke.out 2>/tmp/net-ldapapi-smoke.err; then
              break
            fi
            sleep 1
          done

          cat /tmp/net-ldapapi-smoke.out
          test -s /tmp/net-ldapapi-smoke.out

          t/ci/run-cucumber-features.sh
          EOF

      - name: Upload Cucumber feature results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-results-binary-${{ matrix.expected_openldap }}
          path: ${{ runner.temp }}/cucumber-results/binary-${{ matrix.expected_openldap }}.tsv
          if-no-files-found: ignore

  summarize:
    name: Summarize compatibility matrix
    if: ${{ always() }}
    needs: cucumber
    runs-on: ubuntu-latest
    steps:
      - name: Download Cucumber feature results
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: cucumber-results-binary-*
          path: cucumber-results
          merge-multiple: true

      - name: Publish pass/fail matrix
        id: matrix-summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const failuresByLane = new Map();
            if (fs.existsSync('cucumber-results')) {
              for (const file of fs.readdirSync('cucumber-results')) {
                if (!file.endsWith('.tsv')) {
                  continue;
                }
                const failures = fs.readFileSync(
                  `cucumber-results/${file}`,
                  'utf8',
                ).trim().split('\n').filter(Boolean).map((line) => {
                  const [status, feature, scenario, step, detail] = line.split('\t');
                  return { status, feature, scenario, step, detail };
                }).filter((item) => item.status === 'FAIL');
                failuresByLane.set(file.replace(/\.tsv$/, ''), failures);
              }
            }
            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              },
            );

            const results = jobs.flatMap((job) => {
              const match = job.name.match(
                /^OpenLDAP ([0-9.]+) \(Debian ([^)]+)\)$/,
              );
              if (!match) {
                return [];
              }

              const failedStep = (job.steps || []).find(
                (step) => !['success', 'skipped'].includes(step.conclusion),
              );
              const result = job.conclusion === 'success'
                ? 'PASS'
                : (job.conclusion || 'unknown').toUpperCase();
              const featureFailures = failuresByLane.get(
                `binary-${match[1]}`,
              ) || [];
              const failedFeature = featureFailures.length
                ? featureFailures.map((item) => item.feature).join('<br>')
                : '';
              const failedScenarioStep = featureFailures.length
                ? featureFailures.map((item) => (
                  item.scenario
                    ? `${item.scenario}: ${item.step}`
                    : item.step
                )).join('<br>')
                : '';
              const failedWorkflowStep = featureFailures.length
                ? ''
                : (failedStep ? failedStep.name : '');
              const failureDetail = featureFailures.length
                ? featureFailures.map((item) => item.detail).join('<br>')
                : (result === 'PASS'
                  ? ''
                  : 'Workflow failed before a Cucumber feature result was recorded');

              return [{
                version: match[1],
                debian: match[2],
                result,
                failedWorkflowStep,
                failedFeature,
                failedScenarioStep,
                failureDetail,
                url: job.html_url,
              }];
            }).sort((left, right) => left.version.localeCompare(
              right.version,
              undefined,
              { numeric: true },
            ));
            const escapeCell = (value) => value.replace(/\|/g, '\\|');

            const lines = [
              '# OpenLDAP binary compatibility results',
              '',
              `Run: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              '',
              '| OpenLDAP | Debian | Result | Failed workflow step | Failed feature | Failed scenario step | Detail | Job |',
              '|---|---|---|---|---|---|---|---|',
              ...results.map((item) => [
                `| ${item.version}`,
                item.debian,
                item.result,
                escapeCell(item.failedWorkflowStep || '-'),
                escapeCell(item.failedFeature || '-'),
                escapeCell(item.failedScenarioStep || '-'),
                escapeCell(item.failureDetail || '-'),
                `[logs](${item.url}) |`,
              ].join(' | ')),
            ];

            const summary = `${lines.join('\n')}\n`;
            fs.writeFileSync('openldap-compatibility-matrix.md', summary);
            core.info(summary);
            await core.summary.addRaw(summary).write();

      - name: Upload pass/fail matrix
        if: steps.matrix-summary.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: openldap-compatibility-matrix
          path: openldap-compatibility-matrix.md
          if-no-files-found: error
