name: OpenLDAP compatibility

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  cucumber:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: OpenLDAP 2.4.31 (Debian Wheezy)
            image: debian:wheezy
            expected_openldap: 2.4.31
            debian_archive: true
            debian_suite: wheezy
            cucumber_from_cpan: true
          - name: OpenLDAP 2.4.40 (Debian Jessie)
            image: debian:jessie
            expected_openldap: 2.4.40
            debian_archive: true
            debian_suite: jessie
            cucumber_from_cpan: false
          - name: OpenLDAP 2.5.13 (Debian Bookworm)
            image: debian:bookworm
            expected_openldap: 2.5.13
            debian_archive: false
            cucumber_from_cpan: false
          - name: OpenLDAP 2.6.10 (Debian Trixie)
            image: debian:trixie
            expected_openldap: 2.6.10
            debian_archive: false
            cucumber_from_cpan: false

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Run full Cucumber suite
        env:
          IMAGE: ${{ matrix.image }}
          EXPECTED_OPENLDAP: ${{ matrix.expected_openldap }}
          DEBIAN_ARCHIVE: ${{ matrix.debian_archive }}
          DEBIAN_SUITE: ${{ matrix.debian_suite }}
          CUCUMBER_FROM_CPAN: ${{ matrix.cucumber_from_cpan }}
        run: |
          docker run --rm --interactive \
            --volume "$PWD:/src:ro" \
            --workdir /work \
            --env EXPECTED_OPENLDAP="$EXPECTED_OPENLDAP" \
            --env DEBIAN_ARCHIVE="$DEBIAN_ARCHIVE" \
            --env DEBIAN_SUITE="$DEBIAN_SUITE" \
            --env CUCUMBER_FROM_CPAN="$CUCUMBER_FROM_CPAN" \
            "$IMAGE" \
            bash -s <<'EOF'
          set -euxo pipefail

          export DEBIAN_FRONTEND=noninteractive
          export HOME=/tmp/net-ldapapi-home

          cp -a /src/. /work/
          sed -i "s/\$VERSION = '3\.0\.x';/\$VERSION = '3.000999';/" LDAPapi.pm
          grep -F "\$VERSION = '3.000999';" LDAPapi.pm

          if [ "$DEBIAN_ARCHIVE" = "true" ]; then
            cucumber_packages=(libtest-bdd-cucumber-perl)
            if [ "$CUCUMBER_FROM_CPAN" = "true" ]; then
              cucumber_packages=(
                curl
                libio-stringy-perl
                libjson-pp-perl
                libjson-xs-perl
                libnumber-range-perl
                libtest-bdd-cucumber-perl
              )
            fi

            printf '%s\n' \
              "deb http://archive.debian.org/debian $DEBIAN_SUITE main" \
              "deb http://archive.debian.org/debian-security $DEBIAN_SUITE/updates main" \
              > /etc/apt/sources.list
            printf '%s\n' 'Acquire::Check-Valid-Until "false";' \
              > /etc/apt/apt.conf.d/99archive
            apt-get -o Acquire::Check-Valid-Until=false update
            apt-get -o Acquire::Check-Valid-Until=false \
              --allow-unauthenticated \
              install -y --no-install-recommends \
              build-essential \
              ca-certificates \
              ldap-utils \
              libconvert-asn1-perl \
              libdevel-cover-perl \
              libldap2-dev \
              libsasl2-dev \
              "${cucumber_packages[@]}" \
              slapd
          else
            apt-get update
            apt-get install -y --no-install-recommends \
              build-essential \
              ca-certificates \
              ldap-utils \
              libconvert-asn1-perl \
              libdevel-cover-perl \
              libldap2-dev \
              libsasl2-dev \
              libtest-bdd-cucumber-perl \
              slapd
          fi

          if [ "$CUCUMBER_FROM_CPAN" = "true" ]; then
            printf '%s\n' \
              'deb http://archive.debian.org/debian jessie main' \
              > /etc/apt/sources.list.d/jessie.list
            apt-get -o Acquire::Check-Valid-Until=false update
            apt-get -o Acquire::Check-Valid-Until=false \
              --allow-unauthenticated \
              install -y --no-install-recommends \
              libjson-maybexs-perl=1.002006-1 \
              libjson-pp-perl=2.27300-2
            curl --fail --location --silent --show-error \
              http://cpan.metacpan.org/authors/id/S/SA/SARGIE/Test-BDD-Cucumber-0.31.tar.gz \
              --output /tmp/Test-BDD-Cucumber-0.31.tar.gz
            printf '%s  %s\n' \
              a24b32986256b2bc5235d5d354ef76f841b2ec8ec49b0053564aad959c98999a \
              /tmp/Test-BDD-Cucumber-0.31.tar.gz \
              | sha256sum --check
            tar --extract --gzip \
              --file /tmp/Test-BDD-Cucumber-0.31.tar.gz \
              --directory /tmp
            cd /tmp/Test-BDD-Cucumber-0.31
            perl Makefile.PL
            make install
            cd /work
          fi

          perl -MTest::BDD::Cucumber -e 'print "$Test::BDD::Cucumber::VERSION\n"'

          slapd -VV > /tmp/slapd-version.txt 2>&1 || true
          cat /tmp/slapd-version.txt
          grep -F "$EXPECTED_OPENLDAP" /tmp/slapd-version.txt

          multiarch="$(dpkg-architecture -qDEB_HOST_MULTIARCH)"
          perl Makefile.PL \
            -sdk openldap \
            -include_path /usr/include \
            -lib_path "/usr/lib/$multiarch" \
            -sasl_include_path /usr/include/sasl
          make

          mkdir -p "$HOME"
          cat > "$HOME/.net-ldapapi-test-config.conf" <<'PERL'
          $RunDeveloperTests = 1;
          $TestConfig{'ldap'}{'server'}{'tcp'}{'-host'} = '127.0.0.1';
          $TestConfig{'ldap'}{'server'}{'tcp'}{'-port'} = 39010;
          1;
          PERL

          rm -rf /tmp/net-ldapapi-slapd-data
          install -d /tmp/net-ldapapi-slapd-data /run/slapd /var/run/slapd
          slaptest -f t/ldap/slapd.conf -u
          slapadd -f t/ldap/slapd.conf -l t/ldap/bootstrap.ldif

          slapd -f t/ldap/slapd.conf \
            -h 'ldap://127.0.0.1:39010/ ldapi:///' \
            > /tmp/net-ldapapi-slapd.log 2>&1 &
          slapd_pid="$!"

          cleanup() {
            kill "$slapd_pid" 2>/dev/null || true
            wait "$slapd_pid" 2>/dev/null || true
            cat /tmp/net-ldapapi-slapd.log || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if ldapsearch -LLL -x \
              -H ldap://127.0.0.1:39010 \
              -D cn=admin,dc=example,dc=com \
              -w password \
              -b dc=example,dc=com \
              -s base dn >/tmp/net-ldapapi-smoke.out 2>/tmp/net-ldapapi-smoke.err; then
              break
            fi
            sleep 1
          done

          cat /tmp/net-ldapapi-smoke.out
          test -s /tmp/net-ldapapi-smoke.out

          suite_status=0
          find t/features -maxdepth 1 -type f -name '*.feature' | sort \
            > /tmp/net-ldapapi-features.txt
          while IFS= read -r feature_file; do
            echo "::group::${feature_file}"
            if ! prove -lv t/01-bdd-cucumber.t :: "$feature_file"; then
              suite_status=1
            fi
            echo "::endgroup::"
          done < /tmp/net-ldapapi-features.txt

          exit "$suite_status"
          EOF
